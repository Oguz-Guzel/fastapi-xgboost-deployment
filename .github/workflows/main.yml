name: CI/CD - Hugging Face Space

on:
  push:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Run Tests
        run: uv run pytest

      - name: Validate Docker build
        run: docker build -t fastapi-xgboost-deployment:${{ github.sha }} .

      - name: Push to Hugging Face Space
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

          git remote add space https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE_ID }}
          git push --force space HEAD:main